<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcmeAssist | AI Enterprise Agent</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">
                    <!-- Simple SVG Logo -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="brand-icon">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="7" x2="22" y2="7" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#7C3AED" />
                            </linearGradient>
                            <linearGradient id="paint1_linear" x1="2" y1="19.5" x2="22" y2="19.5" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#7C3AED" />
                            </linearGradient>
                            <linearGradient id="paint2_linear" x1="2" y1="14.5" x2="22" y2="14.5" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4F46E5" />
                                <stop offset="1" stop-color="#7C3AED" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>AcmeAssist</h1>
            </div>
            
            <div class="session-info">
                <span>Enterprise AI Agent</span>
                <div class="status-indicator">
                    <span class="status-dot"></span> Online
                </div>
            </div>
            
            <button id="new-chat-btn" class="secondary-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg>
                New Session
            </button>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div id="chat-history" class="chat-history">
                <!-- Welcome Message -->
                <div class="message assistant welcome-msg">
                    <div class="message-inner">
                        <div class="avatar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12 2.1 7.1"></path><path d="M12 12l9.9 4.9"></path></svg>
                        </div>
                        <div class="message-content">
                            <h3>Welcome to AcmeAssist</h3>
                            <p>I am your intelligent enterprise assistant. I have access to the company handbook, leave policies, IT guidelines, and product FAQs.</p>
                            <div class="suggestions">
                                <button class="suggestion-btn">What is the annual leave policy?</button>
                                <button class="suggestion-btn">What are the rules for remote work?</button>
                                <button class="suggestion-btn">Who do I contact for IT support?</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <form id="chat-form">
                        <input type="text" id="query-input" placeholder="Ask about company policies..." autocomplete="off">
                        <button type="submit" id="send-btn" class="primary-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Typing Indicator Template -->
    <template id="typing-template">
        <div class="message assistant typing-indicator">
            <div class="message-inner">
                <div class="avatar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path></svg>
                </div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/app.js"></script>
</body>
</html>
